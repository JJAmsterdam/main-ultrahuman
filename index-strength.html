<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UltraHuman Main</title>
  <meta name="description" content="Centrale hub van UltraHuman." />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Dosis:wght@600;700&family=Montserrat:wght@400;500;600;700&display=swap');

    :root {
      --bg: #f8f5ef;
      --card: #ffffff;
      --text: #1b1a18;
      --muted: #6b655c;
      --accent: #c9a227;
      --accent-hover: #b08d1f;
      --ring: #eadcaa;
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Montserrat", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, #ffe8d5 0%, transparent 35%),
        radial-gradient(circle at 90% 90%, #f9dcc4 0%, transparent 30%),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(680px, 100%);
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.08);
      padding: 28px;
      border: 1px solid #efe7dc;
    }

    .top {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-bottom: 18px;
    }

    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #f2ede3;
      font-size: 28px;
    }

    h1 {
      margin: 0;
      font-family: "Dosis", "Montserrat", sans-serif;
      font-size: clamp(1.4rem, 2.2vw, 1.9rem);
      line-height: 1.2;
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .links {
      display: grid;
      gap: 12px;
      margin-top: 20px;
    }

    .link {
      display: block;
      text-decoration: none;
      background: var(--accent);
      color: #fff;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid var(--accent);
      font-weight: 700;
      transition: transform 0.14s ease, box-shadow 0.14s ease, border-color 0.14s ease, background 0.14s ease;
    }

    .link:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.08);
      border-color: var(--accent-hover);
      background: var(--accent-hover);
    }

    .foot {
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="card">
    <section class="top">
      <div class="avatar" aria-hidden="true">UH</div>
      <div>
        <h1>UltraHuman</h1>
        <p class="subtitle">Kies je route.</p>
      </div>
    </section>

    <section class="links" aria-label="Belangrijke links">
      <a class="link js-nav" href="https://strength.ultrahuman.nl/social-trainingen.html" data-target="https://strength.ultrahuman.nl/social-trainingen.html">Strength</a>
      <a class="link js-nav" href="https://running.ultrahuman.nl/" data-target="https://running.ultrahuman.nl/">Running</a>
    </section>

    <p class="foot">Main hub voor Strenght & Running.</p>
  </main>
  <script>
    document.querySelectorAll('.js-nav').forEach((link) => {
      link.addEventListener('click', (event) => {
        const target = link.getAttribute('data-target');
        if (!target) return;
        event.preventDefault();
        window.location.replace(target);
      });
    });
  </script>
</body>
</html>
